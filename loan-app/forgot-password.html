<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - MLC</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/api-fix.js"></script>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-50 flex items-center justify-center p-4 font-[Poppins]">

    <!-- Decorative blobs -->
    <div class="fixed top-20 left-10 w-16 h-16 rounded-full bg-indigo-200 opacity-20 animate-pulse"></div>
    <div class="fixed bottom-1/3 right-1/4 w-24 h-24 rounded-full bg-purple-200 opacity-20 animate-pulse delay-1000">
    </div>

    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <a href="index.html">
                <span
                    class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                    MLC
                </span>
            </a>
            <h1 class="mt-4 text-2xl font-bold text-gray-900">Forgot Password?</h1>
            <p class="text-gray-600 text-sm">
                Enter your registered email to receive an OTP
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl border border-white/50">
            <div class="p-8">

                <form id="forgotForm" class="space-y-6">

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            Email Address
                        </label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-indigo-400"></i>
                            <input type="email" id="email" required placeholder="you@gmail.com"
                                class="w-full pl-10 pr-4 py-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                        </div>
                    </div>

                    <!-- Button -->
                    <button type="submit" id="submitBtn" class="w-full py-2.5 rounded-lg text-white font-medium
                        bg-gradient-to-r from-indigo-600 to-purple-600
                        hover:from-indigo-700 hover:to-purple-700
                        transition-all flex items-center justify-center gap-2">

                        <span id="btnText">Send OTP</span>
                    </button>

                </form>

                <!-- Footer -->
                <div class="mt-6 text-center text-sm text-gray-600">
                    Remembered your password?
                    <a href="login.html" class="text-indigo-600 font-medium hover:underline">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay"
            class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center">

            <div class="flex flex-col items-center space-y-4">
                <div class="w-14 h-14 border-4 border-white/30 border-t-white rounded-full animate-spin"></div>
                <p class="text-white text-lg font-medium">Sending OTP...</p>
            </div>
        </div>


        <!-- Back home -->
        <div class="mt-6 text-center">
            <a href="index.html" class="text-gray-600 hover:text-indigo-600 flex items-center justify-center">
                <i class="fas fa-arrow-left mr-1"></i> Back to home
            </a>
        </div>
    </div>

    <!-- Script -->

    <script>
        const form = document.getElementById("forgotForm");
        const overlay = document.getElementById("loadingOverlay");
        const btn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();

            if (!email) {
                alert("Please enter your email");
                return;
            }

            // 🔄 Start animation
            btn.disabled = true;
            btnText.innerText = "Sending OTP...";
            overlay.classList.remove("hidden");

            try {
                const res = await fetch("/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });


                const data = await res.json();

                // Small delay for smooth UX
                setTimeout(() => {
                    overlay.classList.add("hidden");
                    alert(data.msg || "OTP sent");

                    localStorage.setItem("resetEmail", email);
                    window.location.href = "reset-password.html";
                }, 800);

            } catch (err) {
                overlay.classList.add("hidden");
                alert("Server error. Try again later.");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Send OTP";
            }
        });
    </script>


</body>

</html>
