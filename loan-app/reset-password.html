<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - MLC</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="js/api-fix.js"></script>

  <style>
    .otp-input {
      width: 48px;
      height: 60px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      border: 2px solid #e5e7eb;
      border-radius: 0.5rem;
      transition: all 0.25s ease;
    }

    .otp-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, .2);
      outline: none;
      transform: translateY(-2px);
    }
  </style>
</head>

<body
  class="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-50 flex items-center justify-center p-4 font-[Poppins]">

  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
      <a href="index.html">
        <span class="text-3xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
          MLC
        </span>
      </a>
      <h1 class="mt-4 text-2xl font-bold text-gray-900">Reset Password</h1>
      <p id="subtitle" class="text-gray-600 text-sm">Verify OTP to continue</p>
    </div>

    <!-- Card -->
    <div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl p-8 transition-all duration-500">

      <!-- STEP 1: OTP -->
      <div id="otpSection" class="space-y-6">

        <p class="text-center text-sm text-gray-600">
          Enter the 6-digit OTP sent to your email
        </p>

        <div class="flex justify-center gap-2">
          <input maxlength="1" class="otp-input" />
          <input maxlength="1" class="otp-input" />
          <input maxlength="1" class="otp-input" />
          <span class="flex items-center text-gray-400">-</span>
          <input maxlength="1" class="otp-input" />
          <input maxlength="1" class="otp-input" />
          <input maxlength="1" class="otp-input" />
        </div>

        <button id="verifyOtpBtn"
          class="w-full py-2.5 rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 transition">
          Verify OTP
        </button>
      </div>

      <!-- STEP 2: PASSWORD -->
      <div id="passwordSection" class="hidden space-y-4 mt-6 opacity-0 transition-all duration-500">

        <div class="relative">
          <input id="newPassword" type="password" placeholder="New Password"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400">
          <i class="fa-solid fa-eye absolute right-3 top-3 cursor-pointer"
            onclick="togglePassword('newPassword', this)"></i>
        </div>

        <div class="relative">
          <input id="confirmPassword" type="password" placeholder="Confirm Password"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400">
          <i class="fa-solid fa-eye absolute right-3 top-3 cursor-pointer"
            onclick="togglePassword('confirmPassword', this)"></i>
        </div>

        <button id="resetBtn"
          class="w-full py-2.5 rounded-lg text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 transition">
          Reset Password
        </button>
      </div>

    </div>

    <!-- Footer -->
    <div class="mt-6 text-center space-y-2">
      <a href="login.html" class="text-gray-600 hover:text-indigo-600 flex justify-center items-center">
        <i class="fas fa-arrow-left mr-1"></i> Back to Login
      </a>
      <p class="text-sm text-gray-600">
        Having trouble?
        <a href="https://wa.me/qr/3S7QALPXLROCB1" class="text-indigo-600 font-medium hover:underline">
          Contact Support
        </a>
      </p>
    </div>

  </div>

  <script>
    const email = localStorage.getItem("resetEmail");
    const otpInputs = document.querySelectorAll(".otp-input");
    const otpSection = document.getElementById("otpSection");
    const passwordSection = document.getElementById("passwordSection");

    // OTP UX
    otpInputs.forEach((input, i) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\\D/g, "");
        if (input.value && i < otpInputs.length - 1) otpInputs[i + 1].focus();
      });
      input.addEventListener("keydown", e => {
        if (e.key === "Backspace" && !input.value && i > 0) otpInputs[i - 1].focus();
      });
    });

    function getOtp() {
      return Array.from(otpInputs).map(i => i.value).join("");
    }

    // Toggle password
    function togglePassword(id, icon) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
      icon.classList.toggle("fa-eye");
      icon.classList.toggle("fa-eye-slash");
    }

    // STEP 1: Verify OTP
    document.getElementById("verifyOtpBtn").onclick = async () => {
      const otp = getOtp();
      if (otp.length !== 6) return alert("Enter valid 6-digit OTP");

      const res = await fetch("/api/auth/verify-reset-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp })
      });


      const data = await res.json();
      if (!data.success && data.msg !== "Password reset successful") {
        return alert("Invalid or expired OTP");
      }

      otpSection.classList.add("hidden");
      passwordSection.classList.remove("hidden");
      setTimeout(() => passwordSection.classList.add("opacity-100"), 50);
      document.getElementById("subtitle").innerText = "Set your new password";
    };

    // STEP 2: Reset password
    document.getElementById("resetBtn").onclick = async () => {
      const otp = getOtp();
      const pass = newPassword.value;
      const cpass = confirmPassword.value;

      if (pass !== cpass) return alert("Passwords do not match");

      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp, newPassword: pass })
      });

      const data = await res.json();
      if (data.success) {
        alert("✅ Password changed successfully");
        localStorage.removeItem("resetEmail");
        window.location.href = "login.html";
      } else {
        alert(data.msg || "Error resetting password");
      }
    };
  </script>

</body>

</html>
